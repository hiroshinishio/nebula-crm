# Nginx configuration for Nebula CRM — production static file serving.
# Serves the Vite build output from /usr/share/nginx/html.
#
# DEPLOYER ACTION REQUIRED — Content-Security-Policy connect-src:
#   Replace REPLACE_WITH_OIDC_AUTHORITY with the real OIDC authority URL
#   (the value of VITE_OIDC_AUTHORITY, e.g. https://auth.example.com/application/o/nebula/).
#   CSP headers are static strings and cannot be templated at build time.
#   Example sed substitution at container startup:
#     sed -i "s|REPLACE_WITH_OIDC_AUTHORITY|${VITE_OIDC_AUTHORITY}|g" /etc/nginx/nginx.conf

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout 65;

  # Disable nginx version disclosure in error pages and Server header.
  server_tokens off;

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Production security headers.
    #
    # Content-Security-Policy:
    #   - 'unsafe-eval' is omitted (no HMR in production).
    #   - 'unsafe-inline' on style-src is accepted for Phase 1 (see F0009-csp-residual-risk.md).
    #   - connect-src: REPLACE_WITH_OIDC_AUTHORITY must be substituted by the deployer (see above).
    #   - localhost:9000 (dev IdP) is intentionally absent from the production CSP.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' REPLACE_WITH_OIDC_AUTHORITY; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Serve the Vite SPA — fall back to index.html for client-side routes.
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Cache immutable hashed assets aggressively.
    # Vite appends a content hash to JS/CSS filenames in the build output.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";

      # Repeat security headers — add_header in a nested location block does not
      # inherit from the parent server block in nginx.
      add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' REPLACE_WITH_OIDC_AUTHORITY; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Do not cache index.html — it is the SPA entry point and must always reflect
    # the latest deploy (asset filenames change on each build due to content hashing).
    location = /index.html {
      add_header Cache-Control "no-store, no-cache, must-revalidate";

      add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' REPLACE_WITH_OIDC_AUTHORITY; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
  }
}
