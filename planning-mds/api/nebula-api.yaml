openapi: 3.0.3
info:
  title: Nebula API
  version: 0.3.1
  description: |
    Public baseline API contract for the Nebula insurance CRM reference implementation.
    Version 0.3.1 adds Submission/Renewal detail endpoints.
servers:
  - url: https://api.nebula.local
security:
  - bearerAuth: []
tags:
  - name: Brokers
    description: Broker CRUD operations
  - name: Contacts
    description: Contact CRUD operations
  - name: Accounts
    description: Account operations
  - name: MGAs
    description: MGA operations
  - name: Programs
    description: Program operations
  - name: Submissions
    description: Submission workflow operations
  - name: Renewals
    description: Renewal workflow operations
  - name: Dashboard
    description: Dashboard widget data endpoints (F0001)
  - name: Tasks
    description: Task CRUD for My Tasks widget and Task Center
  - name: Timeline
    description: Activity timeline event queries

paths:
  # ──────────────────────────────────────────────────────────────
  # Broker endpoints (existing)
  # ──────────────────────────────────────────────────────────────
  /brokers:
    get:
      operationId: listBrokers
      summary: List brokers
      description: >
        Returns a paginated list of brokers. For brokers with Status=Inactive,
        email and phone fields are returned as null (masking sentinel).
      tags: [Brokers]
      parameters:
        - $ref: "#/components/parameters/BrokerSearchQuery"
        - $ref: "#/components/parameters/BrokerStatusFilter"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated broker list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBrokerList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createBroker
      summary: Create broker
      description: >
        Creates a new broker. Status is omitted from the request and defaults
        to "Pending" server-side. Use PUT /brokers/{id} to change status.
      tags: [Brokers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerCreateRequest"
      responses:
        "201":
          description: Broker created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /brokers/{brokerId}:
    parameters:
      - $ref: "#/components/parameters/BrokerId"
    get:
      operationId: getBrokerById
      summary: Get broker by id
      tags: [Brokers]
      responses:
        "200":
          description: Broker details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateBroker
      summary: Update broker
      description: >
        Updates a broker record. Requires the If-Match header containing the current
        rowVersion. Returns 412 with code=precondition_failed if another user
        modified the broker since the caller last read it.
      tags: [Brokers]
      parameters:
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerUpdateRequest"
      responses:
        "200":
          description: Broker updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteBroker
      summary: Deactivate broker
      description: >
        Soft-deactivates a broker (sets Status=Inactive, IsDeleted=true).
        Returns 409 with code=active_dependencies_exist if active submissions or
        renewals are linked to the broker. The record is retained for audit purposes;
        use POST /brokers/{brokerId}/reactivate (F0002-S0008) to reverse.
      tags: [Brokers]
      responses:
        "204":
          description: Broker deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ──────────────────────────────────────────────────────────────
  # Broker reactivate (F0002-S0008)
  # ──────────────────────────────────────────────────────────────
  /brokers/{brokerId}/reactivate:
    post:
      operationId: reactivateBroker
      summary: Reactivate a deactivated broker
      description: >
        Reverses deactivation (F0002-S0005). Sets Status=Active and IsDeleted=false.
        Requires broker:reactivate permission (DistributionManager or Admin).
        Returns 409 with code=already_active if the broker is not currently deactivated.
      tags: [Brokers]
      parameters:
        - name: brokerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Broker reactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ──────────────────────────────────────────────────────────────
  # Contact endpoints (existing)
  # ──────────────────────────────────────────────────────────────
  /contacts:
    get:
      operationId: listContacts
      summary: List contacts
      description: >
        Returns a paginated list of contacts, optionally filtered by brokerId.
        This endpoint uses a query-parameter filter (not a sub-resource URL) because
        contacts may belong to different brokers and a flat list with filters is
        more flexible for cross-broker search in future phases.
        For contacts whose parent broker has Status=Inactive, email and phone
        fields are returned as null (masking sentinel).
      tags: [Contacts]
      parameters:
        - name: brokerId
          in: query
          required: false
          description: Filter contacts for a specific broker.
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Paginated contact list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedContactList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createContact
      summary: Create contact
      tags: [Contacts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactCreateRequest"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /contacts/{contactId}:
    parameters:
      - $ref: "#/components/parameters/ContactId"
    get:
      operationId: getContactById
      summary: Get contact by id
      tags: [Contacts]
      responses:
        "200":
          description: Contact details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateContact
      summary: Update contact
      tags: [Contacts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdateRequest"
      responses:
        "200":
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteContact
      summary: Delete contact
      tags: [Contacts]
      responses:
        "204":
          description: Contact deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────
  # Account, MGA, Program endpoints (existing)
  # ──────────────────────────────────────────────────────────────
  /accounts:
    get:
      operationId: listAccounts
      summary: List accounts
      tags: [Accounts]
      responses:
        "200":
          description: Account list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /mgas:
    get:
      operationId: listMgas
      summary: List MGAs
      tags: [MGAs]
      responses:
        "200":
          description: MGA list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MGA"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /programs:
    get:
      operationId: listPrograms
      summary: List programs
      tags: [Programs]
      responses:
        "200":
          description: Program list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Program"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ──────────────────────────────────────────────────────────────
  # Submission / Renewal detail endpoints (NEW)
  # ──────────────────────────────────────────────────────────────
  /submissions/{submissionId}:
    parameters:
      - $ref: "#/components/parameters/SubmissionId"
    get:
      operationId: getSubmissionById
      summary: Get submission by id
      tags: [Submissions]
      responses:
        "200":
          description: Submission details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /renewals/{renewalId}:
    parameters:
      - $ref: "#/components/parameters/RenewalId"
    get:
      operationId: getRenewalById
      summary: Get renewal by id
      tags: [Renewals]
      responses:
        "200":
          description: Renewal details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Renewal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────
  # Workflow transition endpoints (existing)
  # ──────────────────────────────────────────────────────────────
  /submissions/{submissionId}/transitions:
    parameters:
      - $ref: "#/components/parameters/SubmissionId"
    get:
      operationId: listSubmissionTransitions
      summary: List submission transitions
      tags: [Submissions]
      responses:
        "200":
          description: Submission transition history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowTransitionRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: transitionSubmission
      summary: Transition submission workflow state
      tags: [Submissions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowTransitionRequest"
      responses:
        "201":
          description: Transition recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowTransitionRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /renewals/{renewalId}/transitions:
    parameters:
      - $ref: "#/components/parameters/RenewalId"
    get:
      operationId: listRenewalTransitions
      summary: List renewal transitions
      tags: [Renewals]
      responses:
        "200":
          description: Renewal transition history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowTransitionRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: transitionRenewal
      summary: Transition renewal workflow state
      tags: [Renewals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowTransitionRequest"
      responses:
        "201":
          description: Transition recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowTransitionRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  # ──────────────────────────────────────────────────────────────
  # Dashboard endpoints (NEW — F0001)
  # ──────────────────────────────────────────────────────────────
  /dashboard/kpis:
    get:
      operationId: getDashboardKpis
      summary: Get dashboard KPI metrics
      description: |
        Returns aggregated KPI metrics for the dashboard: active broker count,
        open submission count, renewal rate, and average turnaround days.
        Values are computed over the specified trailing time window and
        ABAC-scoped to the authenticated user's permissions.
      tags: [Dashboard]
      parameters:
        - name: periodDays
          in: query
          required: false
          description: |
            Trailing time window in days for rate and turnaround calculations
            (capped server-side). Active broker count is always current.
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 90
      responses:
        "200":
          description: KPI metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardKpis"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities:
    get:
      operationId: getDashboardOpportunities
      summary: Get opportunities summary counts
      description: |
        Returns submission and renewal opportunity-stage counts grouped by
        non-terminal status. Used by the Opportunities summary widget.
        Counts are scoped to the selected trailing window and remain ABAC-scoped.
      tags: [Dashboard]
      parameters:
        - name: periodDays
          in: query
          required: false
          description: Trailing time window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Opportunities summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOpportunities"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/outcomes:
    get:
      operationId: getDashboardOpportunityOutcomes
      summary: Get terminal outcomes summary
      description: |
        Returns terminal outcome counts, percentages, and average days-to-exit
        for opportunities in the selected trailing window.
      tags: [Dashboard]
      parameters:
        - name: periodDays
          in: query
          required: false
          description: Trailing time window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Terminal outcomes summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityOutcomes"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/outcomes/{outcomeKey}/items:
    parameters:
      - name: outcomeKey
        in: path
        required: true
        description: Terminal outcome category key.
        schema:
          type: string
          enum: [bound, no_quote, declined, expired, lost_competitor]
    get:
      operationId: getDashboardOpportunityOutcomeItems
      summary: Get opportunity mini-cards for a terminal outcome
      description: |
        Returns up to 5 mini-card items for a specific terminal outcome in the
        selected trailing window, sorted by days-to-exit descending.
      tags: [Dashboard]
      parameters:
        - name: periodDays
          in: query
          required: false
          description: Trailing time window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Terminal outcome mini-card items
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - totalCount
                properties:
                  items:
                    type: array
                    maxItems: 5
                    items:
                      $ref: "#/components/schemas/OpportunityMiniCard"
                  totalCount:
                    type: integer
                    description: Total items in this outcome category.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/flow:
    get:
      operationId: getDashboardOpportunityFlow
      summary: Get opportunity transition flow (connected canvas data)
      description: |
        Returns node/link transition counts derived from WorkflowTransitions for
        submissions or renewals over a trailing time window. Used by the
        dashboard connected flow canvas to show stage progression, branching,
        and terminal exits. Includes optional avgDwellDays and emphasis hints
        for the Friction chapter overlay.
      tags: [Dashboard]
      parameters:
        - name: entityType
          in: query
          required: true
          description: Entity type to aggregate.
          schema:
            type: string
            enum: [submission, renewal]
        - name: periodDays
          in: query
          required: false
          description: Trailing time window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Opportunity flow graph for Sankey visualization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityFlow"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/{entityType}/{status}/items:
    parameters:
      - name: entityType
        in: path
        required: true
        description: Entity type for opportunity items.
        schema:
          type: string
          enum: [submission, renewal]
      - name: status
        in: path
        required: true
        description: Workflow status to filter by.
        schema:
          type: string
    get:
      operationId: getDashboardOpportunityItems
      summary: Get opportunity mini-cards for a status
      description: |
        Returns up to 5 mini-card items for a specific opportunity stage, sorted
        by days-in-status descending (longest stuck first). Lazy-loaded by the
        frontend on hover/click of an opportunity stage pill. ABAC-scoped.
      tags: [Dashboard]
      responses:
        "200":
          description: Opportunity mini-card items
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                  - totalCount
                properties:
                  items:
                    type: array
                    maxItems: 5
                    items:
                      $ref: "#/components/schemas/OpportunityMiniCard"
                  totalCount:
                    type: integer
                    description: Total items in this status (for "View all N" link).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/{entityType}/{status}/breakdown:
    parameters:
      - name: entityType
        in: path
        required: true
        description: Entity type for the workflow stage.
        schema:
          type: string
          enum: [submission, renewal]
      - name: status
        in: path
        required: true
        description: Workflow status to filter by.
        schema:
          type: string
    get:
      operationId: getDashboardOpportunityBreakdown
      summary: Get grouped stage breakdown for a workflow status
      description: |
        Returns grouped counts for items currently in the specified workflow status.
        Supports assigned user, broker, program, line of business, and broker state
        dimensions. Results are ABAC-scoped and include an "Unknown" group for null values.
      tags: [Dashboard]
      parameters:
        - name: groupBy
          in: query
          required: true
          description: Grouping dimension.
          schema:
            type: string
            enum: [assignedUser, broker, program, lineOfBusiness, brokerState]
        - name: periodDays
          in: query
          required: false
          description: Trailing creation window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Grouped stage breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityBreakdown"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/aging:
    get:
      operationId: getDashboardOpportunityAging
      summary: Get stage aging distribution with SLA bands
      description: |
        Returns per-status aging buckets and SLA context (warning/target thresholds with
        on-time/approaching/overdue counts) for submissions or renewals.
      tags: [Dashboard]
      parameters:
        - name: entityType
          in: query
          required: true
          description: Entity type to aggregate.
          schema:
            type: string
            enum: [submission, renewal]
        - name: periodDays
          in: query
          required: false
          description: Trailing time window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Opportunity aging matrix with SLA context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityAging"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/opportunities/hierarchy:
    get:
      operationId: getDashboardOpportunityHierarchy
      summary: Get opportunity hierarchy tree
      description: |
        Returns the entityType → colorGroup → status hierarchy tree used by composition
        visualizations.
      tags: [Dashboard]
      parameters:
        - name: periodDays
          in: query
          required: false
          description: Trailing time window in days (capped server-side).
          schema:
            type: integer
            minimum: 1
            maximum: 730
            default: 180
      responses:
        "200":
          description: Opportunity hierarchy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpportunityHierarchy"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /dashboard/nudges:
    get:
      operationId: getDashboardNudges
      summary: Get nudge cards
      description: |
        Returns up to 3 prioritized nudge cards for the authenticated user.
        Priority order: overdue tasks > stale submissions (>5 days in status) >
        upcoming renewals (within 14 days). All results are ABAC-scoped and
        filtered by task ownership.
      tags: [Dashboard]
      responses:
        "200":
          description: Nudge cards
          content:
            application/json:
              schema:
                type: object
                required:
                  - nudges
                properties:
                  nudges:
                    type: array
                    maxItems: 3
                    items:
                      $ref: "#/components/schemas/NudgeCard"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ──────────────────────────────────────────────────────────────
  # Task endpoints (NEW — F0001 + F0003)
  # ──────────────────────────────────────────────────────────────
  /my/tasks:
    get:
      operationId: getMyTasks
      summary: Get tasks assigned to the authenticated user
      description: |
        Returns tasks assigned to the current user (matched by authenticated user's UserId),
        filtered to Open and InProgress status, sorted by DueDate ascending
        (soonest first, nulls last). Used by the My Tasks dashboard widget.
      tags: [Tasks]
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of tasks to return.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: User's tasks
          content:
            application/json:
              schema:
                type: object
                required:
                  - tasks
                  - totalCount
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskSummary"
                  totalCount:
                    type: integer
                    description: Total open/in-progress tasks (for "View all" link).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tasks:
    post:
      operationId: createTask
      summary: Create a task (self-assigned only in MVP)
      description: Task write endpoints are not registered (404) until F0003 is activated.
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreateRequest"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tasks/{taskId}:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    get:
      operationId: getTaskById
      summary: Get task by id
      tags: [Tasks]
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateTask
      summary: Update task (self-assigned only in MVP)
      description: Task write endpoints are not registered (404) until F0003 is activated.
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdateRequest"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTask
      summary: Soft delete task (self-assigned only in MVP)
      description: Task write endpoints are not registered (404) until F0003 is activated.
      tags: [Tasks]
      responses:
        "204":
          description: Task deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────────────────────
  # Timeline endpoints (NEW — dashboard activity feed)
  # ──────────────────────────────────────────────────────────────
  /timeline/events:
    get:
      operationId: listTimelineEvents
      summary: List timeline events
      description: |
        Returns recent ActivityTimelineEvents filtered by entity type.
        Used by the Broker Activity Feed dashboard widget and by entity 360 views.
        All results are ABAC-scoped.
      tags: [Timeline]
      parameters:
        - name: entityType
          in: query
          required: true
          description: Filter events by entity type.
          schema:
            type: string
            enum: [Broker, Account, Submission, Renewal, Task]
        - name: entityId
          in: query
          required: false
          description: Filter events for a specific entity.
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          description: Page number (1-based). Default 1.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Events per page. Default 50, max 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: limit
          in: query
          required: false
          description: "Deprecated: use page/pageSize. Retained for BrokerUser path compatibility."
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated timeline events
          content:
            application/json:
              schema:
                type: object
                required: [data, page, pageSize, totalCount, totalPages]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TimelineEvent"
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  totalCount:
                    type: integer
                  totalPages:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    BrokerSearchQuery:
      name: q
      in: query
      required: false
      description: Case-insensitive broker name search. License number search is exact match only. Leading/trailing spaces are trimmed.
      schema:
        type: string
        minLength: 1
        maxLength: 100
    BrokerStatusFilter:
      name: status
      in: query
      required: false
      description: Optional broker status filter.
      schema:
        type: string
        enum:
          - Active
          - Inactive
          - Pending
    BrokerId:
      name: brokerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContactId:
      name: contactId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubmissionId:
      name: submissionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RenewalId:
      name: renewalId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: >
        Optimistic concurrency token. Must equal the `rowVersion` value returned
        in the last GET response for this resource. If the resource has been
        modified since then, the server returns HTTP 412 with code=precondition_failed.
      schema:
        type: string
    Page:
      name: page
      in: query
      required: false
      description: Page number (1-based).
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      required: false
      description: Items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Invalid input
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Unauthorized:
      description: Authentication required or invalid token
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Forbidden:
      description: Authenticated but not allowed
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    NotFound:
      description: Resource not found
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    Conflict:
      description: Conflict with current state (for example invalid transition)
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    PreconditionFailed:
      description: Precondition failed (for example stale If-Match value)
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    UnprocessableContent:
      description: Request semantic validation failed
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
        Retry-After:
          description: Suggested delay before retrying the request.
          schema:
            type: string
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
    ServiceUnavailable:
      description: Service or dependency unavailable
      headers:
        X-Request-Id:
          $ref: "#/components/headers/XRequestId"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  headers:
    XRequestId:
      description: Correlation identifier echoed for request tracing.
      schema:
        type: string

  schemas:
    # ── Error Contract ──────────────────────────────────────────
    ProblemDetails:
      type: object
      description: RFC Problem Details payload with Nebula-specific extension fields. Used with application/problem+json. See `planning-mds/architecture/error-codes.md` for the authoritative code list.
      required:
        - type
        - title
        - status
        - code
        - traceId
      properties:
        type:
          type: string
          format: uri
          description: URI reference that identifies the problem type.
        title:
          type: string
          description: Short, human-readable summary of the problem.
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP status code generated for this problem instance.
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: URI reference identifying this specific occurrence.
        code:
          type: string
          description: "Stable machine-readable domain error code. See planning-mds/architecture/error-codes.md for the authoritative list."
        traceId:
          type: string
          description: Correlation identifier for diagnostics and tracing.
        errors:
          type: object
          description: Optional validation error map keyed by field.
          additionalProperties:
            type: array
            items:
              type: string

    # ── Broker Schemas ──────────────────────────────────────────
    Broker:
      type: object
      description: >
        Broker profile. If Status=Inactive, email and phone fields are returned
        as null (masking sentinel). The frontend should display these as "Masked"
        or equivalent placeholder text rather than treating them as absent data.
      required:
        - id
        - legalName
        - licenseNumber
        - state
        - status
      properties:
        id:
          type: string
          format: uuid
        legalName:
          type: string
        licenseNumber:
          type: string
        state:
          type: string
        status:
          type: string
          enum:
            - Active
            - Inactive
            - Pending
        email:
          type: string
          format: email
          nullable: true
          description: >
            Returned as null when Status=Inactive (masking sentinel).
            Consumers must treat null on an inactive broker as "masked", not "missing".
        phone:
          type: string
          pattern: "^\\+?[1-9]\\d{7,14}$"
          nullable: true
          description: >
            Returned as null when Status=Inactive (masking sentinel).
            Consumers must treat null on an inactive broker as "masked", not "missing".
        rowVersion:
          type: string
          description: >
            Optimistic concurrency token. Clients must echo this value in the
            If-Match header on subsequent PUT requests. Value is opaque; do not
            parse or compare numerically.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BrokerCreateRequest:
      type: object
      description: >
        Payload to create a broker. Status is not included; the server
        defaults new brokers to "Pending".
      required:
        - legalName
        - licenseNumber
        - state
      properties:
        legalName:
          type: string
          minLength: 1
          maxLength: 255
        licenseNumber:
          type: string
          minLength: 1
          maxLength: 50
        state:
          type: string
          pattern: "^[A-Z]{2}$"
          description: Two-letter US state code (e.g. CA, NY).
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: "^\\+?[1-9]\\d{7,14}$"

    BrokerUpdateRequest:
      type: object
      description: Payload to update a broker. License number is immutable after creation.
      required:
        - legalName
        - state
        - status
      properties:
        legalName:
          type: string
          minLength: 1
          maxLength: 255
        state:
          type: string
          pattern: "^[A-Z]{2}$"
          description: Two-letter US state code (e.g. CA, NY).
        status:
          type: string
          enum:
            - Active
            - Inactive
            - Pending
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: "^\\+?[1-9]\\d{7,14}$"

    PaginatedBrokerList:
      type: object
      description: Paginated list of brokers.
      required:
        - data
        - page
        - pageSize
        - totalCount
        - totalPages
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Broker"
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer

    # ── Contact Schemas ─────────────────────────────────────────
    Contact:
      type: object
      description: Contact record. If parent broker Status=Inactive, email and phone are returned as null (masking sentinel).
      required:
        - id
        - fullName
        - email
        - phone
      properties:
        id:
          type: string
          format: uuid
        brokerId:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
          nullable: true
        fullName:
          type: string
        email:
          type: string
          format: email
          nullable: true
          description: >
            Returned as null when parent broker Status=Inactive (masking sentinel).
            Consumers must treat null on an inactive broker's contact as "masked", not "missing".
        phone:
          type: string
          pattern: "^\\+?[1-9]\\d{7,14}$"
          nullable: true
          description: >
            Returned as null when parent broker Status=Inactive (masking sentinel).
            Consumers must treat null on an inactive broker's contact as "masked", not "missing".
        role:
          type: string

    ContactCreateRequest:
      type: object
      description: Payload to create a contact.
      required:
        - brokerId
        - fullName
        - email
        - phone
      properties:
        brokerId:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: "^\\+?[1-9]\\d{7,14}$"
        role:
          type: string

    ContactUpdateRequest:
      type: object
      description: Payload to update a contact.
      required:
        - fullName
        - email
        - phone
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        role:
          type: string

    PaginatedContactList:
      type: object
      description: Paginated list of contacts.
      required:
        - data
        - page
        - pageSize
        - totalCount
        - totalPages
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer

    # ── Account / MGA / Program Schemas ─────────────────────────
    Account:
      type: object
      description: Insured account profile.
      required:
        - id
        - name
        - status
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        industry:
          type: string

    MGA:
      type: object
      description: MGA profile.
      required:
        - id
        - name
        - status
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string

    Program:
      type: object
      description: Insurance program profile.
      required:
        - id
        - name
        - mgaId
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        mgaId:
          type: string
          format: uuid

    # ── Submission / Renewal Schemas ───────────────────────────
    Submission:
      type: object
      description: Submission workflow entity.
      required:
        - id
        - accountId
        - brokerId
        - currentStatus
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        brokerId:
          type: string
          format: uuid
        programId:
          type: string
          format: uuid
          nullable: true
        lineOfBusiness:
          type: string
          maxLength: 50
          nullable: true
          enum:
            - Property
            - GeneralLiability
            - CommercialAuto
            - WorkersCompensation
            - ProfessionalLiability
            - Marine
            - Umbrella
            - Surety
            - Cyber
            - DirectorsOfficers
        currentStatus:
          type: string
          enum:
            - Received
            - Triaging
            - WaitingOnBroker
            - ReadyForUWReview
            - InReview
            - Quoted
            - BindRequested
            - Bound
            - Declined
            - Withdrawn
        effectiveDate:
          type: string
          format: date
          nullable: true
        premiumEstimate:
          type: number
          format: double
          minimum: 0
          nullable: true
        assignedToUserId:
          type: string
          format: uuid
          description: Internal UserId (uuid) of assigned user per F0005.
        createdAt:
          type: string
          format: date-time
        createdByUserId:
          type: string
          format: uuid
          description: Internal UserId (uuid) of creator per F0005.
        updatedAt:
          type: string
          format: date-time
        updatedByUserId:
          type: string
          format: uuid
          description: Internal UserId (uuid) of last updater per F0005.

    Renewal:
      type: object
      description: Renewal workflow entity.
      required:
        - id
        - accountId
        - brokerId
        - currentStatus
        - renewalDate
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        brokerId:
          type: string
          format: uuid
        submissionId:
          type: string
          format: uuid
          nullable: true
        lineOfBusiness:
          type: string
          maxLength: 50
          nullable: true
          enum:
            - Property
            - GeneralLiability
            - CommercialAuto
            - WorkersCompensation
            - ProfessionalLiability
            - Marine
            - Umbrella
            - Surety
            - Cyber
            - DirectorsOfficers
        currentStatus:
          type: string
          enum:
            - Created
            - Early
            - OutreachStarted
            - InReview
            - Quoted
            - Bound
            - Lost
            - Lapsed
        renewalDate:
          type: string
          format: date
        assignedToUserId:
          type: string
          format: uuid
          description: Internal UserId (uuid) of assigned user per F0005.
        createdAt:
          type: string
          format: date-time
        createdByUserId:
          type: string
          format: uuid
          description: Internal UserId (uuid) of creator per F0005.
        updatedAt:
          type: string
          format: date-time
        updatedByUserId:
          type: string
          format: uuid
          description: Internal UserId (uuid) of last updater per F0005.

    SubmissionCreateRequest:
      type: object
      description: Payload for submission creation.
      required:
        - accountId
        - brokerId
        - currentStatus
        - effectiveDate
        - premiumEstimate
        - assignedToUserId
      properties:
        accountId:
          type: string
          format: uuid
        brokerId:
          type: string
          format: uuid
        programId:
          type: string
          format: uuid
          nullable: true
        lineOfBusiness:
          type: string
          maxLength: 50
          nullable: true
          enum:
            - Property
            - GeneralLiability
            - CommercialAuto
            - WorkersCompensation
            - ProfessionalLiability
            - Marine
            - Umbrella
            - Surety
            - Cyber
            - DirectorsOfficers
        currentStatus:
          type: string
        effectiveDate:
          type: string
          format: date
        premiumEstimate:
          type: number
          format: double
          minimum: 0
        assignedToUserId:
          type: string
          format: uuid

    SubmissionUpdateRequest:
      type: object
      description: Payload for submission updates.
      properties:
        programId:
          type: string
          format: uuid
          nullable: true
        lineOfBusiness:
          type: string
          maxLength: 50
          nullable: true
          enum:
            - Property
            - GeneralLiability
            - CommercialAuto
            - WorkersCompensation
            - ProfessionalLiability
            - Marine
            - Umbrella
            - Surety
            - Cyber
            - DirectorsOfficers
        currentStatus:
          type: string
        effectiveDate:
          type: string
          format: date
        premiumEstimate:
          type: number
          format: double
          minimum: 0
        assignedToUserId:
          type: string
          format: uuid

    RenewalCreateRequest:
      type: object
      description: Payload for renewal creation.
      required:
        - accountId
        - brokerId
        - currentStatus
        - renewalDate
        - assignedToUserId
      properties:
        accountId:
          type: string
          format: uuid
        brokerId:
          type: string
          format: uuid
        submissionId:
          type: string
          format: uuid
          nullable: true
        lineOfBusiness:
          type: string
          maxLength: 50
          nullable: true
          enum:
            - Property
            - GeneralLiability
            - CommercialAuto
            - WorkersCompensation
            - ProfessionalLiability
            - Marine
            - Umbrella
            - Surety
            - Cyber
            - DirectorsOfficers
        currentStatus:
          type: string
        renewalDate:
          type: string
          format: date
        assignedToUserId:
          type: string
          format: uuid

    RenewalUpdateRequest:
      type: object
      description: Payload for renewal updates.
      properties:
        submissionId:
          type: string
          format: uuid
          nullable: true
        lineOfBusiness:
          type: string
          maxLength: 50
          nullable: true
          enum:
            - Property
            - GeneralLiability
            - CommercialAuto
            - WorkersCompensation
            - ProfessionalLiability
            - Marine
            - Umbrella
            - Surety
            - Cyber
            - DirectorsOfficers
        currentStatus:
          type: string
        renewalDate:
          type: string
          format: date
        assignedToUserId:
          type: string
          format: uuid

    # ── Workflow Schemas ────────────────────────────────────────
    WorkflowTransitionRequest:
      type: object
      description: Request to transition workflow state.
      required:
        - toState
      properties:
        toState:
          type: string
        reason:
          type: string

    WorkflowTransitionRecord:
      type: object
      description: Immutable workflow transition record.
      required:
        - id
        - workflowType
        - entityId
        - fromState
        - toState
        - occurredAt
      properties:
        id:
          type: string
          format: uuid
        workflowType:
          type: string
        entityId:
          type: string
          format: uuid
        fromState:
          type: string
        toState:
          type: string
        reason:
          type: string
        occurredAt:
          type: string
          format: date-time

    # ── Dashboard Schemas (NEW) ─────────────────────────────────
    DashboardKpis:
      type: object
      description: Aggregated KPI metrics for the dashboard, computed over the requested trailing time window.
      required:
        - activeBrokers
        - openSubmissions
        - renewalRate
        - avgTurnaroundDays
      properties:
        activeBrokers:
          type: integer
          description: Count of brokers with Status=Active, ABAC-scoped. Always current (not windowed).
          example: 142
        openSubmissions:
          type: integer
          description: Count of submissions in non-terminal status, ABAC-scoped. Always current (not windowed).
          example: 38
        renewalRate:
          type: number
          format: double
          minimum: 0
          maximum: 100
          nullable: true
          description: |
            Percentage of renewals reaching Bound out of all renewals
            that exited the opportunities funnel in the requested trailing window
            (default 90 days). Null if no data.
          example: 72.5
        avgTurnaroundDays:
          type: number
          format: double
          nullable: true
          description: |
            Mean calendar days from Submission.CreatedAt to first terminal
            state transition in the requested trailing window (default 90 days).
            Null if no data.
          example: 4.2

    DashboardOpportunities:
      type: object
      description: Opportunities summary counts grouped by status.
      required:
        - submissions
        - renewals
      properties:
        submissions:
          type: array
          description: Submission opportunity-stage counts (non-terminal only).
          items:
            $ref: "#/components/schemas/OpportunityStatusCount"
        renewals:
          type: array
          description: Renewal opportunity-stage counts (non-terminal only).
          items:
            $ref: "#/components/schemas/OpportunityStatusCount"

    OpportunityOutcomes:
      type: object
      description: Terminal outcome summary for the selected trailing window.
      required:
        - periodDays
        - totalExits
        - outcomes
      properties:
        periodDays:
          type: integer
          minimum: 1
          maximum: 730
          example: 180
        totalExits:
          type: integer
          minimum: 0
          example: 48
        outcomes:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityOutcome"

    OpportunityOutcome:
      type: object
      description: Aggregated terminal outcome row.
      required:
        - key
        - label
        - branchStyle
        - count
        - percentOfTotal
      properties:
        key:
          type: string
          enum: [bound, no_quote, declined, expired, lost_competitor]
        label:
          type: string
          example: Declined
        branchStyle:
          type: string
          enum: [solid, red_dashed, gray_dotted]
        count:
          type: integer
          minimum: 0
          example: 14
        percentOfTotal:
          type: number
          format: double
          minimum: 0
          maximum: 100
          example: 29.2
        averageDaysToExit:
          type: number
          format: double
          minimum: 0
          nullable: true
          example: 7.6

    OpportunityStatusCount:
      type: object
      description: Count of entities in a specific workflow status.
      required:
        - status
        - count
        - colorGroup
      properties:
        status:
          type: string
          description: Workflow status label.
          example: WaitingOnBroker
        count:
          type: integer
          minimum: 0
          example: 5
        colorGroup:
          type: string
          description: UI color group for the opportunity stage pill.
          enum: [intake, triage, waiting, review, decision]

    OpportunityFlow:
      type: object
      description: Transition flow graph for an opportunity Sankey widget.
      required:
        - entityType
        - periodDays
        - windowStartUtc
        - windowEndUtc
        - nodes
        - links
      properties:
        entityType:
          type: string
          enum: [submission, renewal]
        periodDays:
          type: integer
          minimum: 1
          maximum: 730
          example: 180
        windowStartUtc:
          type: string
          format: date-time
        windowEndUtc:
          type: string
          format: date-time
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityFlowNode"
        links:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityFlowLink"

    OpportunityFlowNode:
      type: object
      description: |
        Flow node representing a workflow status in the connected canvas.
        Used for both the base flow visualization and the Friction chapter overlay.
      required:
        - status
        - label
        - isTerminal
        - displayOrder
        - colorGroup
        - currentCount
        - inflowCount
        - outflowCount
      properties:
        status:
          type: string
          example: WaitingOnBroker
        label:
          type: string
          example: Waiting on Broker
        isTerminal:
          type: boolean
          example: false
        displayOrder:
          type: integer
          description: Deterministic sort order for left-to-right rendering.
          example: 5
        colorGroup:
          type: string
          enum: [intake, triage, waiting, review, decision]
          description: Visual grouping for warm-to-cool color progression across flow stages.
        currentCount:
          type: integer
          minimum: 0
          example: 17
        inflowCount:
          type: integer
          minimum: 0
          example: 25
        outflowCount:
          type: integer
          minimum: 0
          example: 23
        avgDwellDays:
          type: number
          format: double
          nullable: true
          description: |
            Average calendar days items currently spend in this status.
            Computed from the most recent WorkflowTransition into this status
            for each entity currently in this state. Null if no entities in status.
            Used by the Friction chapter overlay to identify bottleneck stages.
          example: 8.3
        emphasis:
          type: string
          nullable: true
          enum: [normal, active, blocked, bottleneck]
          description: |
            Server-computed emphasis hint for the Friction chapter overlay.
            - bottleneck: highest currentCount concentration among non-terminal stages
            - blocked: highest avgDwellDays among non-terminal stages
            - active: rightmost non-zero non-terminal stage in display order
            - normal: default (no special emphasis)
            Null when emphasis is not computed (e.g., insufficient data).
          example: bottleneck

    OpportunityFlowLink:
      type: object
      description: Sankey link between workflow statuses with aggregated transition count.
      required:
        - sourceStatus
        - targetStatus
        - count
      properties:
        sourceStatus:
          type: string
          example: InReview
        targetStatus:
          type: string
          example: Declined
        count:
          type: integer
          minimum: 1
          example: 12

    OpportunityBreakdown:
      type: object
      description: Grouped stage breakdown for a specific workflow status.
      required:
        - entityType
        - status
        - groupBy
        - periodDays
        - groups
        - total
      properties:
        entityType:
          type: string
          enum: [submission, renewal]
        status:
          type: string
          example: Received
        groupBy:
          type: string
          enum: [assignedUser, broker, program, lineOfBusiness, brokerState]
        periodDays:
          type: integer
          minimum: 1
          maximum: 730
          example: 180
        groups:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityBreakdownGroup"
        total:
          type: integer
          minimum: 0
          example: 73

    OpportunityBreakdownGroup:
      type: object
      description: Single grouped bucket for status breakdown.
      required:
        - label
        - count
      properties:
        key:
          type: string
          nullable: true
          example: Property
        label:
          type: string
          example: Property
        count:
          type: integer
          minimum: 0
          example: 42

    OpportunityAging:
      type: object
      description: Per-status aging matrix with optional SLA context.
      required:
        - entityType
        - periodDays
        - statuses
      properties:
        entityType:
          type: string
          enum: [submission, renewal]
        periodDays:
          type: integer
          minimum: 1
          maximum: 730
          example: 180
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityAgingStatus"

    OpportunityAgingStatus:
      type: object
      description: Aging distribution and SLA information for a single workflow status.
      required:
        - status
        - label
        - colorGroup
        - displayOrder
        - sla
        - buckets
        - total
      properties:
        status:
          type: string
          example: Received
        label:
          type: string
          example: Received
        colorGroup:
          type: string
          example: intake
        displayOrder:
          type: integer
          example: 1
        sla:
          allOf:
            - $ref: "#/components/schemas/OpportunityAgingSla"
          nullable: true
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/OpportunityAgingBucket"
        total:
          type: integer
          minimum: 0
          example: 19

    OpportunityAgingSla:
      type: object
      description: SLA thresholds and computed dwell-band counts for the status.
      required:
        - warningDays
        - targetDays
        - onTimeCount
        - approachingCount
        - overdueCount
      properties:
        warningDays:
          type: integer
          minimum: 0
          example: 1
        targetDays:
          type: integer
          minimum: 1
          example: 2
        onTimeCount:
          type: integer
          minimum: 0
          example: 15
        approachingCount:
          type: integer
          minimum: 0
          example: 3
        overdueCount:
          type: integer
          minimum: 0
          example: 1

    OpportunityAgingBucket:
      type: object
      description: Aging day-range bucket count for a workflow status.
      required:
        - key
        - label
        - count
      properties:
        key:
          type: string
          example: 0-2
        label:
          type: string
          example: 0–2 days
        count:
          type: integer
          minimum: 0
          example: 8

    OpportunityHierarchy:
      type: object
      description: Hierarchical tree for opportunity composition views.
      required:
        - periodDays
        - root
      properties:
        periodDays:
          type: integer
          minimum: 1
          maximum: 730
          example: 180
        root:
          $ref: "#/components/schemas/OpportunityHierarchyNode"

    OpportunityHierarchyNode:
      type: object
      description: Tree node for hierarchy composition.
      required:
        - id
        - label
        - count
      properties:
        id:
          type: string
          example: submission:intake
        label:
          type: string
          example: Intake
        count:
          type: integer
          minimum: 0
          example: 42
        levelType:
          type: string
          nullable: true
          enum: [entityType, colorGroup, status]
        colorGroup:
          type: string
          nullable: true
          enum: [intake, triage, waiting, review, decision, won, lost]
        children:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/OpportunityHierarchyNode"

    OpportunityMiniCard:
      type: object
      description: Compact item card for the opportunities popover.
      required:
        - entityId
        - entityName
        - daysInStatus
      properties:
        entityId:
          type: string
          format: uuid
        entityName:
          type: string
          description: Account or Broker name.
          example: Acme Corp
        amount:
          type: number
          format: double
          minimum: 0
          nullable: true
          description: Premium estimate (submissions) or null (renewals).
          example: 45000
        daysInStatus:
          type: integer
          minimum: 0
          description: Calendar days since last transition to current status.
          example: 12
        assignedUserInitials:
          type: string
          maxLength: 2
          description: Two-character initials of assigned user.
          example: JM
        assignedUserDisplayName:
          type: string
          description: Full display name (for tooltip).
          example: John Miller

    NudgeCard:
      type: object
      description: A prioritized action prompt for the dashboard.
      required:
        - nudgeType
        - title
        - description
        - linkedEntityType
        - linkedEntityId
        - linkedEntityName
        - urgencyValue
        - ctaLabel
      properties:
        nudgeType:
          type: string
          enum: [OverdueTask, StaleSubmission, UpcomingRenewal]
        title:
          type: string
          description: Nudge card title.
          example: Follow up with Acme Insurance
        description:
          type: string
          description: Urgency context.
          example: 3 days overdue
        linkedEntityType:
          type: string
          description: Type of linked entity for CTA navigation.
          example: Broker
        linkedEntityId:
          type: string
          format: uuid
        linkedEntityName:
          type: string
          description: Display name for context.
          example: Acme Insurance
        urgencyValue:
          type: integer
          description: |
            Days overdue (OverdueTask), days stuck (StaleSubmission),
            or days until renewal (UpcomingRenewal).
          example: 3
        ctaLabel:
          type: string
          description: Call-to-action button label.
          example: Review Now

    # ── Task Schemas (NEW) ──────────────────────────────────────
    Task:
      type: object
      description: Task entity.
      required:
        - id
        - title
        - status
        - priority
        - assignedToUserId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [Open, InProgress, Done]
        priority:
          type: string
          enum: [Low, Normal, High, Urgent]
        dueDate:
          type: string
          format: date
          nullable: true
        assignedToUserId:
          type: string
          format: uuid
          description: Internal UserId (uuid) of assigned user per F0005.
        linkedEntityType:
          type: string
          nullable: true
        linkedEntityId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    TaskSummary:
      type: object
      description: Compact task representation for dashboard widget.
      required:
        - id
        - title
        - status
        - dueDate
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [Open, InProgress]
        dueDate:
          type: string
          format: date
          nullable: true
        linkedEntityType:
          type: string
          nullable: true
        linkedEntityId:
          type: string
          format: uuid
          nullable: true
        linkedEntityName:
          type: string
          nullable: true
          description: Resolved display name of linked entity.
        isOverdue:
          type: boolean
          description: True if DueDate < today and status is not Done.

    TaskCreateRequest:
      type: object
      description: Payload to create a task. In MVP, tasks are self-assigned only.
      required:
        - title
        - assignedToUserId
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        priority:
          type: string
          enum: [Low, Normal, High, Urgent]
          default: Normal
        dueDate:
          type: string
          format: date
        assignedToUserId:
          type: string
          format: uuid
          description: UserId (uuid) of user to assign. Must match authenticated user's UserId in MVP.
        linkedEntityType:
          type: string
        linkedEntityId:
          type: string
          format: uuid

    TaskUpdateRequest:
      type: object
      description: Payload to update a task. In MVP, tasks are self-assigned only.
      required: []
      minProperties: 1
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        status:
          type: string
          enum: [Open, InProgress, Done]
        priority:
          type: string
          enum: [Low, Normal, High, Urgent]
        dueDate:
          type: string
          format: date
          nullable: true
        assignedToUserId:
          type: string
          format: uuid
          description: If provided, must match authenticated user's UserId in MVP.

    # ── Timeline Schemas (NEW) ──────────────────────────────────
    TimelineEvent:
      type: object
      description: Activity timeline event for the activity feed.
      required:
        - id
        - entityType
        - entityId
        - eventType
        - occurredAt
      properties:
        id:
          type: string
          format: uuid
        entityType:
          type: string
          description: Type of entity this event relates to.
          example: Broker
        entityId:
          type: string
          format: uuid
        eventType:
          type: string
          description: Machine-readable event type.
          example: BrokerCreated
        eventDescription:
          type: string
          description: Human-readable event summary.
          example: New broker added by Sarah Chen
        entityName:
          type: string
          description: Resolved name of the related entity.
          example: Pacific Reinsurance
        actorDisplayName:
          type: string
          description: Display name of the user who performed the action.
          example: Sarah Chen
        occurredAt:
          type: string
          format: date-time
